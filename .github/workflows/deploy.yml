name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Frontend to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/foxio/frontend

            git fetch origin
            git reset --hard origin/main

            docker build -t foxio-frontend .

            docker stop foxio-frontend || true
            docker rm foxio-frontend || true

            docker run -d \
              --name foxio-frontend \
              --restart unless-stopped \
              -p 127.0.0.1:3000:80 \
              foxio-frontend

            docker ps
